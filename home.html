<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!--* Tailwind & daisyUI -->
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5"
			rel="stylesheet"
			type="text/css"
		/>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

		<!--* Google Font -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
			rel="stylesheet"
		/>

		<!--* External CSS -->
		<link rel="stylesheet" href="./styles/style.css" />

		<!--* Favicon Icon -->
		<link
			rel="shortcut icon"
			href="./assets/github-logo.png"
			type="image/x-icon"
		/>

		<!--* Site Title -->
		<title>GitHub Issues Tracker | Home</title>
	</head>
	<body>
		<header>
			<section
				class="flex flex-col w-[90%] space-y-3 md:flex-row md:space-y-0 mx-auto justify-between items-center p-4"
			>
				<div class="flex items-center gap-1">
					<img src="./assets/github-logo.png" alt="" class="w-10" />
					<h1 class="text-xl md:text-2xl font-semibold highColor">
						GitHub Issues Tracker
					</h1>
				</div>

				<div class="flex gap-2">
					<input
						id="search_input"
						type="text"
						placeholder="🔍 Search issues..."
						class="input input-bordered w-full md:w-auto"
					/>
					<button id="search_btn" class="btn btn-primary">Search</button>
				</div>
			</section>
		</header>
		<main class="bgColor pt-12 pb-12">
			<section class="w-[80%] mx-auto">
				<!-- *Tab Buttons Div -->
				<div class="flex gap-3 p-4 rounded-lg bg-white">
					<button
						onclick="activeButton('all_tab_btn')"
						id="all_tab_btn"
						class="btn md:px-8 btn-primary"
					>
						All
					</button>
					<button
						onclick="activeButton('open_tab_btn')"
						id="open_tab_btn"
						class="btn md:px-7"
					>
						Open
					</button>
					<button
						onclick="activeButton('close_tab_btn')"
						id="close_tab_btn"
						class="btn md:px-7"
					>
						Closed
					</button>
				</div>

				<!-- *Issues & Cards Section -->
				<section class="mt-5 rounded-lg">
					<!-- !Issue Counter -->
					<div
						class="flex flex-col space-y-4 md:flex-row md:space-y-0 justify-between p-4 rounded-t-lg bg-white border-b-2 border-[#FBFBFB]"
					>
						<!-- *Left Side -->
						<div class="flex items-center gap-2">
							<div class="bg-[#ECE4FF] p-3 rounded-full">
								<img src="./assets/Aperture.png" alt="" />
							</div>
							<div>
								<h2 class="text-xl font-semibold">
									<span id="issue_count">0</span> Issues
								</h2>
								<p class="normalColor">
									Track and manage your project issues
								</p>
							</div>
						</div>

						<!-- *Right Side -->
						<div class="flex items-center gap-10">
							<div class="flex items-center gap-2">
								<div class="badge bg-green-500 badge-xs"></div>
								<p class="font-medium">Open</p>
							</div>

							<div class="flex items-center gap-2">
								<div class="badge bg-purple-500 badge-xs"></div>
								<p class="font-medium">Closed</p>
							</div>
						</div>
					</div>

					<!-- !Loading Spinner -->
					<section id="loading_spinner" class="hidden">
						<div class="flex justify-center p-10">
							<span class="loading loading-spinner loading-xl"></span>
						</div>
					</section>

					<!-- !No Search Result Error -->
					<section id="no_search_result" class="hidden">
						<div class="flex justify-center p-10">
							<p
								class="badge badge-outline badge-info badge-sm md:badge-xl rounded-full"
							>
								NO SEARCH RESULT FOUND!
							</p>
						</div>
					</section>

					<!-- !Cards Container -->
					<div
						id="card_container"
						class="grid grid-cols-1 md:grid-cols-2 p-4 gap-4 lg:grid-cols-4 bg-white rounded-b-lg"
					></div>

					<!-- Open the modal using ID.showModal() method -->
					<dialog id="my_modal_1" class="modal">
						<div
							id="modal_container"
							class="modal-box max-w-2xl p-10"
						></div>
					</dialog>
				</section>
			</section>
		</main>

		<script src="./scripts/home.js"></script>
	</body>
</html>
