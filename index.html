<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!--* Tailwind & daisyUI -->
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5"
			rel="stylesheet"
			type="text/css"
		/>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

		<!--* Google Font -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
			rel="stylesheet"
		/>

		<!--* External CSS -->
		<link rel="stylesheet" href="./styles/style.css" />

		<!--* Site Title -->
		<title>GitHub Issues Tracker | Login</title>
	</head>
	<body>
		<main id="mainTag" class="bgColor">
			<section class="min-h-screen flex justify-center items-center">
				<div class="text-center bg-white shadow-sm rounded space-y-5 p-5">
					<!-- Logo & name -->
					<div>
						<div class="flex justify-center mb-10">
							<img src="./assets/github-logo.png" alt="" />
						</div>
						<h2 class="text-2xl font-semibold highColor">
							GitHub Issues Tracker
						</h2>
						<p class="normalColor">Sign in to manage your issues</p>
					</div>

					<!-- Login Form -->
					<div>
						<fieldset class="fieldset border-none w-xs">
							<label class="label highColor text-base">Username</label>
							<input
								id="input_admin_name"
								type="text"
								class="input"
								placeholder="Enter Username"
							/>

							<label class="text-left text-[#4A00FF]"
								>Default: admin</label
							>

							<label class="label highColor text-base mt-3"
								>Password</label
							>
							<input
								id="input_admin_Pass"
								type="password"
								class="input"
								placeholder="Enter Password"
							/>
							<label class="text-left text-[#4A00FF]"
								>Default: admin123</label
							>

							<button id="loginButton" class="btn btn-primary mt-4">
								Sign In
							</button>
						</fieldset>
					</div>

					<!-- Devider -->
					<div class="divider">OR</div>

					<!-- Demo Credentials -->
					<div>
						<p class="normalColor text-xs">Demo Credentials:</p>
						<div class="bgColor rounded p-5 mt-1">
							<h4 class="font-bold">
								Username: <span class="font-normal">admin</span>
							</h4>
							<h4 class="font-bold">
								Password: <span class="font-normal">admin123</span>
							</h4>
						</div>
					</div>
				</div>
			</section>

			<!-- Open the modal using ID.showModal() method -->
			<dialog id="my_modal_2" class="modal modal-top sm:modal-middle">
				<div class="modal-box">
					<h3 class="text-lg font-bold">Login Faild!!</h3>
					<p class="py-4">
						Enter <span class="bg-red-200 p-1">admin</span> as a username
					</p>
					<p>
						And password will be
						<span class="bg-red-200 p-1">admin123</span>
					</p>
				</div>
				<form method="dialog" class="modal-backdrop">
					<button>close</button>
				</form>
			</dialog>
		</main>
		<script src="./scripts/login.js"></script>
	</body>
</html>
